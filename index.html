<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Friendly Ghost</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#05040a;
    --midnight:#0b1030;
    --deep-purple:#241242;
    --white:#ffffff;
    --cyan:#7ff2ff;
    --ice-blue:#bfe8ff;
    --lavender:#c9b6ff;
    --soft-pink:#ffc3e0;

    --fog-opacity:.22;
    --star-brightness:.35;
    --aurora-opacity:0;
    --vignette:.75;
    --ghost-glow:.35;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;overflow:hidden;
    background:var(--black);
    font-family:'Nunito',sans-serif;
    -webkit-font-smoothing:antialiased;
    cursor:default;
  }
  #stage{
    position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;
    background:radial-gradient(120% 90% at 50% 15%, var(--deep-purple) 0%, var(--midnight) 45%, var(--black) 100%);
    transition:background 2.2s ease;
  }
  #stage.magical{
    background:radial-gradient(130% 100% at 50% 20%, #2a1a55 0%, #12163f 45%, #05040a 100%);
  }
  #stage.dusk{
    background:radial-gradient(130% 100% at 50% 25%, #160c33 0%, #0a0a22 50%, #030308 100%);
  }

  canvas#bg-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  .aurora{
    position:absolute;inset:-10% -10% 40% -10%;
    filter:blur(60px);
    mix-blend-mode:screen;
    opacity:var(--aurora-opacity);
    transition:opacity 2.5s ease;
    pointer-events:none;
  }
  .aurora .blob{
    position:absolute;border-radius:50%;
    opacity:.55;
    animation:auroraDrift 26s ease-in-out infinite;
  }
  .aurora .b1{width:60vw;height:40vh;left:-10%;top:0;background:radial-gradient(circle, var(--cyan), transparent 70%);animation-duration:24s;}
  .aurora .b2{width:55vw;height:45vh;right:-10%;top:5%;background:radial-gradient(circle, var(--lavender), transparent 70%);animation-duration:30s;animation-delay:-8s;}
  .aurora .b3{width:50vw;height:35vh;left:20%;top:20%;background:radial-gradient(circle, var(--soft-pink), transparent 70%);animation-duration:34s;animation-delay:-15s;}
  @keyframes auroraDrift{
    0%{transform:translate(0,0) scale(1);}
    50%{transform:translate(6%, 4%) scale(1.12);}
    100%{transform:translate(0,0) scale(1);}
  }

  .fog-layer{
    position:absolute;left:-20%;width:140%;bottom:-6%;
    height:38vh;
    background-repeat:repeat-x;
    background-size:900px 100%;
    opacity:var(--fog-opacity);
    filter:blur(6px);
    pointer-events:none;
    transition:opacity 2s ease;
  }
  #fog1{
    background-image:radial-gradient(ellipse 320px 140px at 10% 60%, rgba(191,232,255,.55), transparent 70%),
                      radial-gradient(ellipse 380px 160px at 45% 70%, rgba(201,182,255,.4), transparent 70%),
                      radial-gradient(ellipse 300px 130px at 80% 55%, rgba(191,232,255,.5), transparent 70%);
    animation:fogDrift 38s linear infinite;
    bottom:-8%;height:34vh;
  }
  #fog2{
    background-image:radial-gradient(ellipse 340px 150px at 20% 50%, rgba(255,255,255,.35), transparent 70%),
                      radial-gradient(ellipse 300px 140px at 60% 65%, rgba(191,232,255,.3), transparent 70%),
                      radial-gradient(ellipse 260px 120px at 90% 45%, rgba(201,182,255,.3), transparent 70%);
    animation:fogDrift 52s linear infinite reverse;
    bottom:-4%;height:26vh;opacity:calc(var(--fog-opacity) * .8);
  }
  @keyframes fogDrift{
    from{transform:translateX(0);}
    to{transform:translateX(-900px);}
  }

  .vignette{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 100% at 50% 50%, transparent 45%, rgba(0,0,0,var(--vignette)) 100%);
    transition:background 2s ease;
  }

  /* glowing distant eyes */
  #eyes{
    position:absolute;left:50%;top:34%;
    transform:translate(-50%,-50%);
    display:flex;gap:26px;
    opacity:0;
    filter:drop-shadow(0 0 8px rgba(191,232,255,.9)) drop-shadow(0 0 22px rgba(191,232,255,.5));
    pointer-events:none;
    z-index:5;
    transition:left 1.2s ease, top 1.2s ease;
  }
  #eyes span{
    width:10px;height:16px;border-radius:50%;background:#eafcff;
    transform-origin:center;
  }
  #eyes.blink span{animation:eyeBlink .35s ease;}
  @keyframes eyeBlink{
    0%,100%{transform:scaleY(1);}
    50%{transform:scaleY(.05);}
  }
  #eyes.show{opacity:1;transition:opacity 1.1s ease;}
  #eyes.hide{opacity:0;transition:opacity 1s ease;}

  /* ghost */
  #ghost-wrap{
    position:absolute;
    left:50%;top:52%;
    width:190px;height:230px;
    transform:translate(-155%, -50%) scale(.85);
    opacity:0;
    z-index:20;
    transition:opacity .4s ease;
    filter:drop-shadow(0 0 22px rgba(127,242,255,var(--ghost-glow)));
  }
  #ghost-wrap.visible{opacity:1;}
  #ghost-float{
    width:100%;height:100%;
    animation:floatY 3.6s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes floatY{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-14px) rotate(1.2deg);}
  }
  #ghost-lean{
    width:100%;height:100%;
    transition:transform .5s ease-out;
  }
  #ghost-svg{width:100%;height:100%;display:block;overflow:visible;}
  .ghost-shadow{
    position:absolute;bottom:-6px;left:50%;
    width:90px;height:18px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse, rgba(0,0,0,.55), transparent 70%);
    filter:blur(4px);
    animation:shadowPulse 3.6s ease-in-out infinite;
  }
  @keyframes shadowPulse{
    0%,100%{opacity:.55;transform:translateX(-50%) scaleX(1);}
    50%{opacity:.3;transform:translateX(-50%) scaleX(.82);}
  }

  #ghost-wrap.wiggle #ghost-lean{animation:wiggle 2.6s ease-in-out infinite;}
  @keyframes wiggle{
    0%,100%{transform:rotate(0deg);}
    25%{transform:rotate(-2.5deg);}
    75%{transform:rotate(2.5deg);}
  }
  #ghost-wrap.spin #ghost-lean{animation:spinOnce .7s cubic-bezier(.34,1.56,.64,1);}
  @keyframes spinOnce{
    from{transform:rotate(0deg) scale(1);}
    50%{transform:rotate(190deg) scale(1.12);}
    to{transform:rotate(360deg) scale(1);}
  }
  #ghost-wrap.boo #ghost-lean{animation:booPop .55s cubic-bezier(.2,1.6,.4,1);}
  @keyframes booPop{
    0%{transform:scale(.9) rotate(-4deg);}
    55%{transform:scale(1.18) rotate(3deg);}
    100%{transform:scale(1) rotate(0deg);}
  }
  #ghost-wrap.tilt #ghost-lean{animation:tiltHead 1.4s ease-in-out;}
  @keyframes tiltHead{
    0%,100%{transform:rotate(0deg);}
    40%{transform:rotate(-8deg);}
    70%{transform:rotate(4deg);}
  }
  #ghost-wrap.shrink-fade{
    transition:opacity 2.6s ease, transform 2.6s ease;
  }

  .hand{transform-origin:center; }
  #ghost-wrap.wave .hand-r{animation:waveHand 1.6s ease-in-out 2;}
  @keyframes waveHand{
    0%,100%{transform:rotate(0deg);}
    25%{transform:rotate(-24deg);}
    75%{transform:rotate(10deg);}
  }

  .pupil{transition:transform .12s linear;}
  .eye-blink-inner{animation:none;}
  #ghost-svg.blinking .eye-lid{animation:lidBlink .28s ease;}
  @keyframes lidBlink{
    0%,100%{transform:scaleY(0);}
    50%{transform:scaleY(1);}
  }
  #ghost-svg.wink .eye-lid-r{animation:lidBlink .5s ease;}

  .mouth-smile{transition:d .3s ease;}

  /* speech bubble */
  .bubble{
    position:absolute;
    max-width:340px;
    padding:18px 22px;
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.35);
    border-radius:22px;
    backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);
    box-shadow:0 8px 32px rgba(0,0,0,.35), inset 0 0 20px rgba(191,232,255,.08);
    color:#f2fbff;
    font-family:'Poppins',sans-serif;
    font-weight:500;
    font-size:17px;
    line-height:1.55;
    text-align:center;
    opacity:0;
    transform:translate(-50%, 10px) scale(.9);
    transform-origin:bottom center;
    transition:opacity .45s ease, transform .45s cubic-bezier(.2,1.4,.4,1);
    z-index:30;
    pointer-events:none;
    white-space:pre-wrap;
  }
  .bubble::after{
    content:'';
    position:absolute;left:50%;bottom:-9px;
    transform:translateX(-50%);
    width:18px;height:18px;
    background:rgba(255,255,255,.12);
    border-right:1px solid rgba(255,255,255,.35);
    border-bottom:1px solid rgba(255,255,255,.35);
    clip-path:polygon(0 0, 100% 0, 50% 100%);
  }
  .bubble.show{opacity:1;transform:translate(-50%, 0) scale(1);}
  .bubble .cursor{
    display:inline-block;width:2px;height:1em;background:var(--ice-blue);
    vertical-align:-.15em;margin-left:2px;
    animation:blinkCursor .85s step-end infinite;
  }
  @keyframes blinkCursor{50%{opacity:0;}}
  .bubble.secret{
    font-size:15.5px;
    color:#dfeeff;
    background:rgba(20,10,40,.35);
  }

  /* particles fx layer (hearts, stars, sparkles) */
  #fx-layer{position:absolute;inset:0;pointer-events:none;z-index:25;overflow:visible;}
  .fx-item{position:absolute;will-change:transform,opacity;}

  /* start overlay */
  #start-overlay{
    position:fixed;inset:0;z-index:100;
    background:#000;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:opacity 1.4s ease;
  }
  #start-overlay p{
    color:rgba(220,230,255,.55);
    font-family:'Poppins',sans-serif;
    font-weight:400;
    letter-spacing:.12em;
    font-size:13px;
    text-transform:uppercase;
    animation:pulseText 2.6s ease-in-out infinite;
  }
  @keyframes pulseText{0%,100%{opacity:.35;}50%{opacity:.85;}}
  #start-overlay.hidden{opacity:0;pointer-events:none;}

  /* replay hint */
  #replay-hint{
    position:absolute;left:50%;bottom:8%;
    transform:translateX(-50%);
    color:rgba(220,230,255,.6);
    font-family:'Poppins',sans-serif;
    font-size:13px;letter-spacing:.08em;text-transform:uppercase;
    opacity:0;transition:opacity 1.4s ease;
    pointer-events:none;
    z-index:40;
  }
  #replay-hint.show{opacity:1;pointer-events:auto;cursor:pointer;animation:pulseText 2.6s ease-in-out infinite;}

  body.shake #stage{animation:screenShake .3s linear;}
  @keyframes screenShake{
    0%,100%{transform:translate(0,0);}
    20%{transform:translate(-2px,1px);}
    40%{transform:translate(2px,-1px);}
    60%{transform:translate(-1px,2px);}
    80%{transform:translate(1px,-2px);}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important; animation-iteration-count:1 !important; transition-duration:.2s !important;}
  }
</style>
</head>
<body>

<div id="start-overlay"><p>Tap to enter the dark</p></div>

<div id="stage">
  <canvas id="bg-canvas"></canvas>
  <div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
  <div class="fog-layer" id="fog1"></div>
  <div class="fog-layer" id="fog2"></div>
  <div class="vignette"></div>

  <div id="eyes"><span></span><span></span></div>

  <div id="ghost-wrap">
    <div class="ghost-shadow"></div>
    <div id="ghost-float">
      <div id="ghost-lean">
        <svg id="ghost-svg" viewBox="0 0 200 240">
          <defs>
            <radialGradient id="bodyGlow" cx="50%" cy="35%" r="70%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="70%" stop-color="#eaf9ff"/>
              <stop offset="100%" stop-color="#cdeeff"/>
            </radialGradient>
            <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="6"/>
            </filter>
          </defs>

          <!-- soft cyan aura behind body -->
          <ellipse cx="100" cy="120" rx="78" ry="92" fill="#7ff2ff" opacity="0.18" filter="url(#softBlur)"/>

          <!-- body -->
          <path d="M100,18
                   C50,18 26,58 26,108
                   L26,190
                   C26,190 40,175 52,190
                   C64,205 76,205 88,190
                   C94,182 106,182 112,190
                   C124,205 136,205 148,190
                   C160,175 174,190 174,190
                   L174,108
                   C174,58 150,18 100,18 Z"
                fill="url(#bodyGlow)" stroke="rgba(180,230,255,.5)" stroke-width="1.5"/>

          <!-- little hands -->
          <ellipse class="hand hand-l" cx="30" cy="128" rx="12" ry="16" fill="#f4fdff"/>
          <ellipse class="hand hand-r" cx="170" cy="128" rx="12" ry="16" fill="#f4fdff"/>

          <!-- blush -->
          <ellipse cx="62" cy="140" rx="11" ry="7" fill="#ffc3e0" opacity=".55"/>
          <ellipse cx="138" cy="140" rx="11" ry="7" fill="#ffc3e0" opacity=".55"/>

          <!-- eyes -->
          <g id="eye-l">
            <ellipse cx="74" cy="112" rx="13" ry="16" fill="#1a1a24"/>
            <circle class="pupil" cx="78" cy="106" r="4" fill="#ffffff" opacity=".9"/>
            <rect class="eye-lid eye-lid-l" x="61" y="96" width="26" height="16" fill="#eaf9ff" style="transform-origin:74px 96px; transform:scaleY(0);"/>
          </g>
          <g id="eye-r">
            <ellipse cx="126" cy="112" rx="13" ry="16" fill="#1a1a24"/>
            <circle class="pupil" cx="130" cy="106" r="4" fill="#ffffff" opacity=".9"/>
            <rect class="eye-lid eye-lid-r" x="113" y="96" width="26" height="16" fill="#eaf9ff" style="transform-origin:126px 96px; transform:scaleY(0);"/>
          </g>

          <!-- mouth -->
          <path class="mouth-smile" d="M88,146 Q100,158 112,146" stroke="#3a3a44" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </div>

  <div id="bubble-greet" class="bubble"></div>
  <div id="bubble-secret" class="bubble secret"></div>

  <div id="fx-layer"></div>
  <div id="replay-hint">✨ click to see the ghost again ✨</div>
</div>

<script>
(function(){
"use strict";

/* ============ CANVAS PARTICLE BACKGROUND ============ */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W,H,DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = canvas.width = innerWidth*DPR;
  H = canvas.height = innerHeight*DPR;
  canvas.style.width = innerWidth+'px';
  canvas.style.height = innerHeight+'px';
}
resize();
window.addEventListener('resize', resize);

let phase = 'dark'; // dark | magical | dusk

const stars = [];
const NUM_STARS = 90;
for(let i=0;i<NUM_STARS;i++){
  stars.push({
    x:Math.random(), y:Math.random()*0.75,
    r:Math.random()*1.4+0.4,
    phase:Math.random()*Math.PI*2,
    speed:Math.random()*0.4+0.15,
    drift:(Math.random()-0.5)*0.00006
  });
}

const dust = [];
const NUM_DUST = 46;
for(let i=0;i<NUM_DUST;i++){
  dust.push({
    x:Math.random(), y:Math.random(),
    r:Math.random()*1.6+0.6,
    vx:(Math.random()-0.5)*0.00012,
    vy:-(Math.random()*0.00018+0.00004),
    phase:Math.random()*Math.PI*2
  });
}

const bokeh = [];
const NUM_BOKEH = 7;
for(let i=0;i<NUM_BOKEH;i++){
  bokeh.push({
    x:Math.random(), y:Math.random()*0.8,
    r:Math.random()*70+50,
    vx:(Math.random()-0.5)*0.00003,
    vy:(Math.random()-0.5)*0.00002,
    hue: i%2===0 ? 'cyan':'lav'
  });
}

let sparkleTrail = []; // {x,y (px), life, color}

function colorFor(hue, alpha){
  if(hue==='cyan') return `rgba(127,242,255,${alpha})`;
  if(hue==='lav') return `rgba(201,182,255,${alpha})`;
  return `rgba(255,255,255,${alpha})`;
}

let t0 = performance.now();
function draw(now){
  const t = (now-t0)/1000;
  ctx.clearRect(0,0,W,H);

  const starBright = phase==='dark' ? 0.55 : (phase==='dusk' ? 0.4 : 0.9);
  const dustBright = phase==='dark' ? 0.25 : (phase==='dusk'?0.3:0.8);
  const bokehBright = phase==='magical' ? 0.5 : (phase==='dusk'?0.22:0.12);

  // bokeh
  bokeh.forEach(b=>{
    b.x += b.vx; b.y += b.vy;
    if(b.x<-0.2)b.x=1.2; if(b.x>1.2)b.x=-0.2;
    if(b.y<-0.2)b.y=1.0; if(b.y>1.0)b.y=-0.2;
    const px=b.x*W, py=b.y*H, r=b.r*DPR;
    const g = ctx.createRadialGradient(px,py,0,px,py,r);
    g.addColorStop(0, colorFor(b.hue, bokehBright*0.5));
    g.addColorStop(1, colorFor(b.hue, 0));
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
  });

  // stars
  stars.forEach(s=>{
    s.x += s.drift;
    if(s.x<0)s.x=1; if(s.x>1)s.x=0;
    const tw = 0.5+0.5*Math.sin(t*s.speed + s.phase);
    ctx.fillStyle = `rgba(235,245,255,${(0.3+0.7*tw)*starBright})`;
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r*DPR, 0, Math.PI*2);
    ctx.fill();
  });

  // dust / fireflies
  dust.forEach(d=>{
    d.x += d.vx; d.y += d.vy;
    if(d.y<-0.05){d.y=1.05; d.x=Math.random();}
    if(d.x<-0.05)d.x=1.05; if(d.x>1.05)d.x=-0.05;
    const tw = 0.5+0.5*Math.sin(t*0.8 + d.phase);
    const hue = phase==='dark' ? 'white' : 'cyan';
    ctx.fillStyle = colorFor(hue, (0.25+0.55*tw)*dustBright);
    ctx.beginPath();
    ctx.arc(d.x*W, d.y*H, d.r*DPR, 0, Math.PI*2);
    ctx.fill();
  });

  // sparkle trail (ghost ending)
  sparkleTrail = sparkleTrail.filter(p=>p.life>0);
  sparkleTrail.forEach(p=>{
    p.life -= 0.016;
    p.x += p.vx; p.y += p.vy;
    const a = Math.max(0,p.life);
    ctx.fillStyle = `rgba(191,232,255,${a})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*DPR*a+1, 0, Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

function emitSparkleAt(clientX, clientY, count){
  for(let i=0;i<(count||6);i++){
    sparkleTrail.push({
      x:clientX*DPR, y:clientY*DPR,
      vx:(Math.random()-0.5)*1.4*DPR, vy:(Math.random()-1)*1.2*DPR,
      r:Math.random()*2+1,
      life:1
    });
  }
}

/* ============ WEB AUDIO (no external files) ============ */
let actx=null;
function ensureAudio(){
  if(!actx){ actx = new (window.AudioContext||window.webkitAudioContext)(); }
  if(actx.state==='suspended') actx.resume();
}

function windLoop(){
  ensureAudio();
  const bufferSize = 2*actx.sampleRate;
  const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1)*0.5; }
  const noise = actx.createBufferSource();
  noise.buffer = buffer; noise.loop = true;
  const bandpass = actx.createBiquadFilter();
  bandpass.type='bandpass'; bandpass.frequency.value=380; bandpass.Q.value=0.6;
  const gain = actx.createGain(); gain.gain.value=0;
  noise.connect(bandpass); bandpass.connect(gain); gain.connect(actx.destination);
  noise.start();
  gain.gain.linearRampToValueAtTime(0.05, actx.currentTime+2.5);
  gain.gain.linearRampToValueAtTime(0.0, actx.currentTime+9);
  setTimeout(()=>{ try{noise.stop();}catch(e){} }, 10000);
}

function heartbeat(){
  ensureAudio();
  [0, 0.32].forEach(delay=>{
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type='sine'; o.frequency.value=55;
    g.gain.setValueAtTime(0, actx.currentTime+delay);
    g.gain.linearRampToValueAtTime(0.5, actx.currentTime+delay+0.03);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+delay+0.35);
    o.connect(g); g.connect(actx.destination);
    o.start(actx.currentTime+delay); o.stop(actx.currentTime+delay+0.4);
  });
}

function whoosh(){
  ensureAudio();
  const bufferSize = actx.sampleRate*0.6;
  const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i]=(Math.random()*2-1); }
  const src = actx.createBufferSource(); src.buffer=buffer;
  const filt = actx.createBiquadFilter(); filt.type='bandpass';
  filt.frequency.setValueAtTime(200, actx.currentTime);
  filt.frequency.exponentialRampToValueAtTime(2200, actx.currentTime+0.5);
  const g = actx.createGain(); g.gain.setValueAtTime(0.2, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.6);
  src.connect(filt); filt.connect(g); g.connect(actx.destination);
  src.start();
}

function chime(){
  ensureAudio();
  [880,1174,1568].forEach((f,i)=>{
    const o=actx.createOscillator(); const g=actx.createGain();
    o.type='sine'; o.frequency.value=f;
    const start = actx.currentTime + i*0.09;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.08, start+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, start+0.5);
    o.connect(g); g.connect(actx.destination);
    o.start(start); o.stop(start+0.55);
  });
}

function giggle(){
  ensureAudio();
  const notes=[660,760,700,820];
  notes.forEach((f,i)=>{
    const o=actx.createOscillator(); const g=actx.createGain();
    o.type='triangle'; o.frequency.value=f;
    const start = actx.currentTime + i*0.075;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(0.09, start+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, start+0.13);
    o.connect(g); g.connect(actx.destination);
    o.start(start); o.stop(start+0.15);
  });
}

/* ============ BACKGROUND MUSIC (procedural, no voice) ============ */
let musicStarted=false;
let musicGain, musicFilter, droneNodes=[], arpTimer=null, musicMood='dark';

const CHORDS = {
  dark:    [55.00, 65.41, 82.41],   // A1 C2 E2 - hollow, minor
  magical: [65.41, 98.00, 130.81],  // C2 G2 C3 - open, bright
  dusk:    [58.27, 69.30, 87.31]    // Bb1 C#2 F2 - soft, wistful
};
const ARP_SCALES = {
  magical: [523.25,587.33,659.25,783.99,880.00,987.77], // C major pentatonic-ish, sparkly
  dusk:    [493.88,587.33,659.25,739.99]                // gentler, slower
};

function initMusic(){
  ensureAudio();
  if(musicStarted) return;
  musicStarted = true;

  musicGain = actx.createGain();
  musicGain.gain.value = 0.0001;

  musicFilter = actx.createBiquadFilter();
  musicFilter.type = 'lowpass';
  musicFilter.frequency.value = 260;
  musicFilter.connect(musicGain);

  const delay = actx.createDelay();
  delay.delayTime.value = 0.4;
  const feedback = actx.createGain();
  feedback.gain.value = 0.28;
  const delayWet = actx.createGain();
  delayWet.gain.value = 0.35;
  delay.connect(feedback); feedback.connect(delay);
  delay.connect(delayWet); delayWet.connect(musicGain);
  musicFilter.connect(delay);

  musicGain.connect(actx.destination);

  CHORDS.dark.forEach((f,i)=>{
    const o = actx.createOscillator();
    o.type = i===0 ? 'sine' : 'triangle';
    o.frequency.value = f;
    const g = actx.createGain();
    g.gain.value = 0.16;
    o.connect(g); g.connect(musicFilter);
    o.start();
    droneNodes.push({o,g});
  });

  musicGain.gain.linearRampToValueAtTime(0.06, actx.currentTime+3);

  scheduleArpeggio();
}

function setMusicMood(mood){
  musicMood = mood;
  if(!musicStarted) return;
  const chord = CHORDS[mood] || CHORDS.dark;
  droneNodes.forEach((n,i)=>{
    n.o.frequency.linearRampToValueAtTime(chord[i], actx.currentTime+2.2);
  });
  if(mood==='magical'){
    musicFilter.frequency.linearRampToValueAtTime(1800, actx.currentTime+2.2);
    musicGain.gain.linearRampToValueAtTime(0.09, actx.currentTime+2.2);
  } else if(mood==='dusk'){
    musicFilter.frequency.linearRampToValueAtTime(650, actx.currentTime+2.2);
    musicGain.gain.linearRampToValueAtTime(0.06, actx.currentTime+2.2);
  } else {
    musicFilter.frequency.linearRampToValueAtTime(260, actx.currentTime+1.4);
    musicGain.gain.linearRampToValueAtTime(0.055, actx.currentTime+1.4);
  }
}

function playArpNote(freq, vol){
  const o = actx.createOscillator();
  o.type='sine';
  o.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, actx.currentTime);
  g.gain.linearRampToValueAtTime(vol, actx.currentTime+0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+1.6);
  o.connect(g); g.connect(musicFilter);
  o.start(); o.stop(actx.currentTime+1.7);
}

function scheduleArpeggio(){
  clearTimeout(arpTimer);
  function loop(){
    if(musicMood==='magical' || musicMood==='dusk'){
      const scale = ARP_SCALES[musicMood] || ARP_SCALES.magical;
      const note = scale[Math.floor(Math.random()*scale.length)];
      playArpNote(note, musicMood==='magical' ? 0.05 : 0.035);
    }
    const wait = musicMood==='magical' ? (1200+Math.random()*1400) : (2200+Math.random()*1800);
    arpTimer = setTimeout(loop, wait);
  }
  arpTimer = setTimeout(loop, 2500);
}

/* ============ DOM REFS ============ */
const stage = document.getElementById('stage');
const eyesEl = document.getElementById('eyes');
const ghostWrap = document.getElementById('ghost-wrap');
const ghostLean = document.getElementById('ghost-lean');
const ghostSvg = document.getElementById('ghost-svg');
const bubbleGreet = document.getElementById('bubble-greet');
const bubbleSecret = document.getElementById('bubble-secret');
const fxLayer = document.getElementById('fx-layer');
const replayHint = document.getElementById('replay-hint');
const startOverlay = document.getElementById('start-overlay');

function setPhase(p){
  phase = p;
  setMusicMood(p);
  stage.classList.remove('magical','dusk');
  if(p==='magical') stage.classList.add('magical');
  if(p==='dusk') stage.classList.add('dusk');
  const root = document.documentElement.style;
  if(p==='dark'){
    root.setProperty('--fog-opacity','.22');
    root.setProperty('--star-brightness','.4');
    root.setProperty('--aurora-opacity','0');
    root.setProperty('--vignette','.8');
    root.setProperty('--ghost-glow','.2');
  } else if(p==='magical'){
    root.setProperty('--fog-opacity','.28');
    root.setProperty('--aurora-opacity','.5');
    root.setProperty('--vignette','.55');
    root.setProperty('--ghost-glow','.55');
  } else if(p==='dusk'){
    root.setProperty('--fog-opacity','.3');
    root.setProperty('--aurora-opacity','.3');
    root.setProperty('--vignette','.72');
    root.setProperty('--ghost-glow','.35');
  }
}

/* ============ GHOST POSITIONING ============ */
function centerGhost(){
  ghostWrap.style.left='50%';
  ghostWrap.style.top='52%';
  ghostWrap.style.transform='translate(-50%,-50%) scale(.95)';
}
function leftPeekGhost(){
  ghostWrap.style.left='6%';
  ghostWrap.style.top='55%';
  ghostWrap.style.transform='translate(-70%,-50%) scale(.7)';
}
function leftHiddenGhost(){
  ghostWrap.style.left='-14%';
  ghostWrap.style.top='55%';
  ghostWrap.style.transform='translate(-50%,-50%) scale(.65)';
}
function offscreenSide(side){
  const map = {
    left:{left:'-16%', top:'50%'},
    right:{left:'116%', top:'50%'},
    top:{left:'50%', top:'-16%'}
  };
  const p = map[side];
  ghostWrap.style.left=p.left; ghostWrap.style.top=p.top;
  ghostWrap.style.transform='translate(-50%,-50%) scale(.7)';
}

ghostWrap.style.transition='left .7s cubic-bezier(.3,.9,.4,1), top .7s cubic-bezier(.3,.9,.4,1), transform .7s cubic-bezier(.3,.9,.4,1), opacity .5s ease';

/* ============ BLINK LOOP ============ */
let blinkTimer=null;
function startBlinkLoop(){
  clearTimeout(blinkTimer);
  function loop(){
    ghostSvg.classList.add('blinking');
    setTimeout(()=>ghostSvg.classList.remove('blinking'), 300);
    blinkTimer = setTimeout(loop, 2600+Math.random()*2600);
  }
  blinkTimer = setTimeout(loop, 1800);
}
function stopBlinkLoop(){ clearTimeout(blinkTimer); }

/* ============ TYPING ANIMATION ============ */
function typeText(el, text, speed, onDone){
  el.innerHTML = '';
  el.classList.add('show');
  let i=0;
  const cursor = document.createElement('span');
  cursor.className='cursor';
  function step(){
    if(i>=text.length){
      cursor.remove();
      onDone && onDone();
      return;
    }
    const ch = text[i];
    if(ch === '\n'){
      el.appendChild(document.createElement('br'));
    } else {
      el.insertBefore(document.createTextNode(ch), cursor);
    }
    i++;
    const isEmoji = /[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u.test(ch);
    setTimeout(step, isEmoji ? speed*4 : (ch===' ' ? speed*0.6 : speed));
  }
  el.appendChild(cursor);
  step();
}

function positionBubble(el, offsetY){
  const rect = ghostWrap.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const topY = rect.top + offsetY;
  el.style.left = cx+'px';
  el.style.top = 'auto';
  el.style.bottom = (innerHeight - topY)+'px';
}

/* ============ MOUSE INTERACTION: eyes + lean ============ */
let mouseX=innerWidth/2, mouseY=innerHeight/2;
let interactive=false;
document.addEventListener('mousemove', e=>{
  mouseX=e.clientX; mouseY=e.clientY;
});
function trackEyes(){
  if(interactive && ghostWrap.classList.contains('visible')){
    const rect = ghostWrap.getBoundingClientRect();
    const cx = rect.left+rect.width/2, cy = rect.top+rect.height*0.45;
    let dx = (mouseX-cx)/rect.width, dy=(mouseY-cy)/rect.height;
    dx = Math.max(-1,Math.min(1,dx)); dy = Math.max(-1,Math.min(1,dy));
    document.querySelectorAll('.pupil').forEach(p=>{
      p.style.transform = `translate(${dx*3}px, ${dy*3}px)`;
    });
    const leanX = dx*6, leanY = dy*4;
    ghostLean.style.transform = `translate(${leanX}px, ${leanY}px) rotate(${dx*3}deg)`;
  }
  requestAnimationFrame(trackEyes);
}
requestAnimationFrame(trackEyes);

/* ============ FX: hearts / star burst ============ */
function spawnFx(kind, count){
  const rect = ghostWrap.getBoundingClientRect();
  const cx = rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<count;i++){
    const item = document.createElement('div');
    item.className='fx-item';
    const angle = Math.random()*Math.PI*2;
    const dist = 40+Math.random()*70;
    const dx = Math.cos(angle)*dist, dy=Math.sin(angle)*dist - 30;
    item.style.left = cx+'px'; item.style.top=cy+'px';
    item.style.fontSize = (14+Math.random()*14)+'px';
    item.textContent = kind==='heart' ? '💙' : '✨';
    item.style.opacity='1';
    item.style.transition='transform 1.1s cubic-bezier(.2,.7,.3,1), opacity 1.1s ease';
    fxLayer.appendChild(item);
    requestAnimationFrame(()=>{
      item.style.transform = `translate(${dx}px, ${dy}px) scale(${0.6+Math.random()*0.8})`;
      item.style.opacity='0';
    });
    setTimeout(()=>item.remove(), 1200);
  }
}

/* ============ TIMELINE ============ */
let endingTimer=null;
let secretDone=false;

function resetSceneForRestart(){
  clearTimeout(endingTimer);
  stopBlinkLoop();
  interactive=false;
  secretDone=false;
  ghostWrap.classList.remove('visible','wiggle','spin','boo','tilt','wave','shrink-fade');
  ghostWrap.style.opacity='';
  bubbleGreet.classList.remove('show');
  bubbleSecret.classList.remove('show');
  eyesEl.classList.remove('show','hide','blink');
  eyesEl.style.opacity='0';
  replayHint.classList.remove('show');
  setPhase('dark');
  leftHiddenGhost();
}

function runTimeline(){
  initMusic();
  setPhase('dark');
  windLoop();

  // 2s of near darkness with fog + drifting particles already animating

  setTimeout(()=>{ // eyes appear
    eyesEl.style.left='50%'; eyesEl.style.top='34%';
    eyesEl.classList.add('show');
  }, 2000);

  setTimeout(()=>{ // blink once
    eyesEl.classList.add('blink');
  }, 2900);

  setTimeout(()=>{ // disappear
    eyesEl.classList.remove('show','blink');
    eyesEl.classList.add('hide');
  }, 3300);

  setTimeout(()=>{ // heartbeat + shake
    heartbeat();
    document.body.classList.add('shake');
    setTimeout(()=>document.body.classList.remove('shake'), 350);
  }, 3900);

  setTimeout(()=>{ // ghost peeks from left
    leftHiddenGhost();
    ghostWrap.classList.add('visible');
    requestAnimationFrame(()=>leftPeekGhost());
  }, 4500);

  setTimeout(()=>{ // looks around then hides
    ghostLean.style.transform='rotate(-6deg)';
  }, 4900);

  setTimeout(()=>{
    leftHiddenGhost();
  }, 5300);

  setTimeout(()=>{ // BOO! fly to center
    whoosh();
    ghostLean.style.transform='';
    centerGhost();
    ghostWrap.classList.add('boo');
    setPhase('magical');
    setTimeout(()=>chime(), 150);
  }, 5800);

  setTimeout(()=>{
    ghostWrap.classList.remove('boo');
    ghostWrap.classList.add('wiggle');
    startBlinkLoop();
    interactive = true;
  }, 6500);

  setTimeout(()=>{ // speech bubble appears
    positionBubble(bubbleGreet, -6);
    bubbleGreet.classList.add('show');
    typeText(bubbleGreet, "Hellow Aliennuu... 👻💙\nEpdi iruka?\nVazhkai epdi pogudu?", 48, ()=>{
      setTimeout(()=>{
        chime();
        ghostWrap.classList.add('tilt');
        setTimeout(()=>ghostWrap.classList.remove('tilt'), 1500);
        setTimeout(()=>{
          bubbleGreet.classList.remove('show');
        }, 2600);
        scheduleEnding();
      }, 900);
    });
  }, 7300);
}

function scheduleEnding(){
  endingTimer = setTimeout(runEndingSequence, 10000);
}

function runEndingSequence(){
  if(secretDone) return;
  secretDone = true;
  interactive = false;

  // drift closer, background darkens
  ghostWrap.classList.remove('wiggle');
  ghostWrap.style.transform = 'translate(-50%,-50%) scale(1.12)';
  setPhase('dusk');

  setTimeout(()=>{
    ghostSvg.classList.add('wink');
    setTimeout(()=>ghostSvg.classList.remove('wink'), 550);
  }, 700);

  setTimeout(()=>{
    positionBubble(bubbleSecret, -4);
    bubbleSecret.classList.add('show');
    typeText(bubbleSecret, "Naan eppovum unna paathutu iruppen...\nAana bayapadadha...\nNanban dhaan. 💙👻", 46, ()=>{
      setTimeout(()=>{
        finalGoodbye();
      }, 1400);
    });
  }, 1500);
}

function finalGoodbye(){
  ghostWrap.classList.add('wave');
  bubbleSecret.classList.remove('show');

  // sparkle trail while drifting back into fog
  const rect = ()=>ghostWrap.getBoundingClientRect();
  let ticks=0;
  const trailInterval = setInterval(()=>{
    const r = rect();
    emitSparkleAt(r.left+r.width/2, r.top+r.height/2, 4);
    ticks++;
    if(ticks>28) clearInterval(trailInterval);
  }, 90);

  setTimeout(()=>{
    ghostWrap.classList.add('shrink-fade');
    ghostWrap.style.left='50%';
    ghostWrap.style.top='30%';
    ghostWrap.style.transform='translate(-50%,-50%) scale(.35)';
    ghostWrap.style.opacity='0';
  }, 300);

  setTimeout(()=>{
    ghostWrap.classList.remove('visible','wave','shrink-fade');
    // eyes appear once more, watching
    eyesEl.style.left='58%'; eyesEl.style.top='40%';
    eyesEl.classList.remove('hide');
    eyesEl.classList.add('show');
  }, 3100);

  setTimeout(()=>{
    eyesEl.classList.remove('show');
    eyesEl.classList.add('hide');
  }, 5400);

  setTimeout(()=>{
    replayHint.classList.add('show');
  }, 6200);
}

/* ============ INTERACTIONS ============ */
ghostWrap.addEventListener('mouseenter', ()=>{
  if(!interactive) return;
  document.documentElement.style.setProperty('--ghost-glow','.85');
});
ghostWrap.addEventListener('mouseleave', ()=>{
  if(!interactive) return;
  document.documentElement.style.setProperty('--ghost-glow','.55');
});

ghostWrap.addEventListener('click', (e)=>{
  if(!interactive) return;
  giggle();
  ghostWrap.classList.remove('spin');
  void ghostWrap.offsetWidth;
  ghostWrap.classList.add('spin');
  spawnFx('heart', 5);
  spawnFx('star', 6);
  setTimeout(()=>ghostWrap.classList.remove('spin'), 750);
});

ghostWrap.addEventListener('dblclick', (e)=>{
  if(!interactive) return;
  e.stopPropagation();
  positionBubble(bubbleGreet, -6);
  bubbleGreet.classList.add('show');
  typeText(bubbleGreet, "Hellow Aliennuu... 👻💙\nEpdi iruka?\nVazhkai epdi pogudu?", 34, ()=>{
    chime();
    setTimeout(()=>bubbleGreet.classList.remove('show'), 1800);
  });
});

ghostWrap.addEventListener('contextmenu', (e)=>{
  e.preventDefault();
  if(!interactive) return;
  interactive=false;
  bubbleGreet.classList.remove('show');
  ghostWrap.classList.remove('wiggle');
  ghostWrap.style.transform = ghostWrap.style.transform + ' scale(.5)';
  ghostWrap.style.opacity='0';
  setTimeout(()=>{
    const sides=['left','right','top'];
    const side = sides[Math.floor(Math.random()*sides.length)];
    offscreenSide(side);
    setTimeout(()=>{
      ghostWrap.style.opacity='1';
      centerGhost();
      ghostWrap.classList.add('boo');
      whoosh();
      setTimeout(()=>{
        ghostWrap.classList.remove('boo');
        ghostWrap.classList.add('wiggle');
        interactive=true;
      }, 600);
    }, 60);
  }, 3000);
});

/* replay */
function startExperience(){
  resetSceneForRestart();
  requestAnimationFrame(()=>{
    runTimeline();
  });
}
replayHint.addEventListener('click', ()=>{
  replayHint.classList.remove('show');
  startExperience();
});

startOverlay.addEventListener('click', ()=>{
  ensureAudio();
  startOverlay.classList.add('hidden');
  setTimeout(()=>{ startOverlay.style.display='none'; }, 1500);
  startExperience();
}, {once:true});

// initial state
leftHiddenGhost();
setPhase('dark');

})();
</script>
